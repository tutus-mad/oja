<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Todo</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@agberohq/oja@v0.0.8/build/oja.min.css">
    <style>

    </style>
</head>
<body>
<div class="app">
    <h1>Tasks</h1>
    <div class="add-row">
        <input type="text" id="inp" placeholder="Add a task…">
        <button id="add">Add</button>
    </div>
    <div id="list"></div>
</div>
<script type="module">
    import { state, effect } from 'https://cdn.jsdelivr.net/npm/@agberohq/oja@v0.0.8/build/oja.core.esm.js';

    const [tasks, setTasks] = state([]);
    const inp  = document.getElementById('inp');
    const list = document.getElementById('list');

    effect(() => {
        const all = tasks();
        if (all.length === 0) {
            list.innerHTML = '<div class="empty">No tasks yet</div>';
            return;
        }
        list.innerHTML = '';
        all.forEach((t, i) => {
            const div = document.createElement('div');
            div.className = 'task' + (t.done ? ' done' : '');
            div.innerHTML = `<input type="checkbox" ${t.done ? 'checked' : ''} data-i="${i}"><span>${t.text}</span><button class="task-del" data-i="${i}">✕</button>`;
            list.appendChild(div);
        });
    });

    document.getElementById('add').onclick = () => {
        if (inp.value.trim()) {
            setTasks([...tasks(), { text: inp.value.trim(), done: false }]);
            inp.value = '';
        }
    };

    inp.addEventListener('keydown', e => {
        if (e.key === 'Enter') document.getElementById('add').click();
    });

    list.addEventListener('change', e => {
        if (e.target.dataset.i !== undefined)
            setTasks(tasks().map((t, i) => i == e.target.dataset.i ? { ...t, done: !t.done } : t));
    });

    list.addEventListener('click', e => {
        if (e.target.classList.contains('task-del'))
            setTasks(tasks().filter((_, i) => i != e.target.dataset.i));
    });
</script>
</body>
</html>
