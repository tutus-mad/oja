<div class="layout">
    <!-- Left sidebar -->
    <aside class="sidebar">
        <div class="logo">🐦</div>
        <nav>
            <a href="#/" class="nav-item" data-page="/">
                <span class="icon">🏠</span>
                <span>Home</span>
            </a>
            <a href="#/explore" class="nav-item" data-page="/explore">
                <span class="icon">🔍</span>
                <span>Explore</span>
                <span class="nav-badge" data-if="unreadCount">{{unreadCount}}</span>
            </a>
            <a href="#/profile" class="nav-item" data-page="/profile">
                <span class="icon">👤</span>
                <span>Profile</span>
            </a>
        </nav>
        <button class="post-button" data-action="compose">Tweet</button>
        <!-- User info shown when logged in -->
        <div class="user-info" data-if="currentUser">
            <div class="avatar">{{currentUser.avatar}}</div>
            <div>
                <div class="font-bold">{{currentUser.name}}</div>
                <div class="text-secondary">@{{currentUser.username}}</div>
            </div>
        </div>
        <div data-if-not="currentUser" class="user-info">
            <a href="#/login" class="login-prompt">Sign in</a>
        </div>
    </aside>
    <!-- Main content outlet -->
    <main class="main" id="main-outlet"></main>
    <!-- Right sidebar -->
    <aside class="right-sidebar">
        <div class="search-box">
            <span>🔍</span>
            <input type="search" placeholder="Search Twitter" id="search">
        </div>
        <!-- Trends -->
        <div class="trending-card">
            <h3>Trends for you</h3>
            <div id="trends-list">
                <template data-each="trends" data-as="trend">
                    <div class="trending-item">
                        <div class="trending-category">{{trend.category}}</div>
                        <div class="trending-name">#{{trend.name}}</div>
                        <div class="trending-count">{{trend.tweets}} tweets</div>
                    </div>
                </template>
                <div data-empty="trends" class="empty-feed">
                    No trends available
                </div>
            </div>
        </div>
        <!-- Who to follow -->
        <div class="trending-card" id="who-to-follow"></div>
    </aside>
</div>
<script type="module">
    import { effect, each, component, context, on } from '../../../../build/oja.core.esm.js';

    // Get trends context for reactive updates
    const [trends] = context('trends');

    // Load "Who to follow" component with mock suggestions
    component.mount('#who-to-follow', 'components/who-to-follow.html', {
        suggestions : props.whoToFollow || [],
        currentUser : props.currentUser,
    });

    // Re-render the trends list whenever context changes
    effect(() => {
        const trendsList  = document.getElementById('trends-list');
        if (!trendsList) return;
        const currentTrends = trends();

        const emptyEl = trendsList.querySelector('[data-empty="trends"]');
        if (!currentTrends || currentTrends.length === 0) {
            if (emptyEl) emptyEl.style.display = 'block';
            return;
        }
        if (emptyEl) emptyEl.style.display = 'none';

        each(trendsList, 'trends', currentTrends);
    });

    // Navigate to explore page on Enter key in search box
    const searchInput = document.getElementById('search');
    if (searchInput) {
        on(searchInput, 'keypress', (e) => {
            if (e.key === 'Enter' && searchInput.value.trim()) {
                window.location.hash = `#/explore?q=${encodeURIComponent(searchInput.value.trim())}`;
            }
        });
    }
</script>
