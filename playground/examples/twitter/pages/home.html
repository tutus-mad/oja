<div class="page home">
    <div class="page-header">
        <h1>Home</h1>
    </div>
    <!-- Compose box -->
    <div class="compose-box" data-if="currentUser">
        <div class="avatar">{{currentUser.avatar}}</div>
        <div class="compose-content">
            <form id="compose-form">
                <textarea name="content"
                          placeholder="What's happening?"
                          maxlength="280"
                          id="compose-textarea"></textarea>
                <div class="compose-footer">
                    <span id="char-count" class="char-count">0/280</span>
                    <button type="submit" class="compose-submit" data-loading="Posting...">
                        Tweet
                    </button>
                </div>
            </form>
        </div>
    </div>
    <!-- Tweets feed -->
    <div class="feed" id="feed">
        <div id="tweets-container"></div>
        <div data-empty="tweets" class="empty-feed">
            No tweets yet. Be the first to tweet!
        </div>
    </div>
</div>
<script type="module">
    import { component, effect, state, form, on, notify, context } from '../../../../build/oja.core.esm.js';

    const MAX_TWEET_LENGTH = 280;
    const COLOR_WARNING    = '#f4212e';
    const COLOR_NORMAL     = '#71767b';
    const CHAR_WARN_AT     = 260;

    // Shared context so new tweets appear across all pages
    const [tweets, setTweets] = context('tweets');
    const [content, setContent] = state('');
    const textarea  = find('#compose-textarea');
    const charCount = find('#char-count');
    const feed      = find('#feed');
    const tweetsEl  = find('#tweets-container');

    // Update character count display with color warning near limit
    effect(() => {
        if (!charCount) return;
        const len = content().length;
        charCount.textContent = `${len}/${MAX_TWEET_LENGTH}`;
        charCount.style.color = len > CHAR_WARN_AT ? COLOR_WARNING : COLOR_NORMAL;
    });

    if (textarea) {
        on(textarea, 'input', (e) => setContent(e.target.value));
    }

    const formEl = document.getElementById('compose-form');
    if (formEl) {
        form.on(formEl, {
            submit: async (data) => {
                if (!data.content?.trim()) throw new Error("Can't tweet nothing!");
                const currentUserVal = props.currentUser;
                if (!currentUserVal) throw new Error('Not logged in');
                const newTweet = {
                    id           : Date.now().toString(),
                    userId       : currentUserVal.id,
                    userName     : currentUserVal.name,
                    userUsername : currentUserVal.username,
                    userAvatar   : currentUserVal.avatar,
                    content      : data.content.trim(),
                    likes        : 0,
                    retweets     : 0,
                    replies      : 0,
                    timestamp    : Date.now(),
                    liked        : false,
                    retweeted    : false,
                };
                setTweets([newTweet, ...tweets()]);
                return newTweet;
            },
            success: () => {
                if (textarea) textarea.value = '';
                setContent('');
                notify.success('Tweet posted!');
            },
            error: (err) => {
                if (err.message !== 'validation') notify.error(err.message);
            },
        });
    }

    // Re-render the tweet list reactively whenever tweets context changes
    effect(() => {
        if (!tweetsEl) return;
        const currentTweets = tweets();
        const emptyEl       = feed.querySelector('[data-empty="tweets"]');

        if (!currentTweets || currentTweets.length === 0) {
            tweetsEl.innerHTML = '';
            if (emptyEl) emptyEl.style.display = 'block';
            return;
        }

        if (emptyEl) emptyEl.style.display = 'none';

        tweetsEl.innerHTML = '';
        currentTweets.forEach(tweet => {
            const wrapper = document.createElement('div');
            tweetsEl.appendChild(wrapper);
            component.mount(wrapper, 'components/tweet.html', {
                ...tweet,
                currentUser: props.currentUser,
            });
        });
    });
</script>
