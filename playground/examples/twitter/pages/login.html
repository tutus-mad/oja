<div class="auth-page">
    <div class="auth-container">
        <div class="auth-logo">🐦</div>
        <h1>Sign in to Twitter</h1>
        <form id="login-form" class="auth-form">
            <div class="field">
                <label for="username">Username</label>
                <input type="text"
                       id="username"
                       name="username"
                       value="alexj"
                       required>
                <span class="field-error" data-field="username"></span>
            </div>
            <div class="field">
                <label for="password">Password</label>
                <input type="password"
                       id="password"
                       name="password"
                       value="password"
                       required>
                <span class="field-error" data-field="password"></span>
            </div>
            <button type="submit" class="auth-button" data-loading="Signing in...">
                Sign In
            </button>
        </form>
        <div class="auth-footer">
            <p>Demo: Use any username/password</p>
        </div>
    </div>
</div>
<script type="module">
    import { form, auth, notify, context } from '../../../../build/oja.core.esm.js';
    import { mockData } from '../data/mock.js';

    const [, setCurrentUser] = context('user');
    const formEl = document.getElementById('login-form');

    // Handle login form submission with mock authentication
    form.on(formEl, {
        submit: async (data) => {
            const user = mockData.users.find(u => u.username === data.username);
            if (!user) throw new Error('Invalid credentials');
            await auth.session.start('mock-jwt-token');
            setCurrentUser(user);
            return user;
        },
        success: () => {
            notify.success('Logged in successfully!');
        },
        error: (err) => {
            form.showError(formEl, 'username', err.message);
            form.showError(formEl, 'password', err.message);
        },
    });
</script>
