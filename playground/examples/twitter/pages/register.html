<div class="auth-page">
    <div class="auth-container">
        <div class="auth-logo">🐦</div>
        <h1>Join Twitter today</h1>

        <form id="register-form" class="auth-form">
            <div class="field">
                <label for="name">Full name</label>
                <input type="text"
                       id="name"
                       name="name"
                       placeholder="Alex Johnson"
                       required>
                <span class="field-error" data-field="name"></span>
            </div>

            <div class="field">
                <label for="username">Username</label>
                <input type="text"
                       id="username"
                       name="username"
                       placeholder="alexj"
                       required>
                <span class="field-error" data-field="username"></span>
            </div>

            <div class="field">
                <label for="email">Email</label>
                <input type="email"
                       id="email"
                       name="email"
                       placeholder="alex@example.com"
                       required>
                <span class="field-error" data-field="email"></span>
            </div>

            <div class="field">
                <label for="password">Password</label>
                <input type="password"
                       id="password"
                       name="password"
                       placeholder="••••••••"
                       required>
                <span class="field-error" data-field="password"></span>
            </div>

            <div class="field">
                <label for="confirm-password">Confirm password</label>
                <input type="password"
                       id="confirm-password"
                       name="confirmPassword"
                       placeholder="••••••••"
                       required>
                <span class="field-error" data-field="confirmPassword"></span>
            </div>

            <button type="submit" class="auth-button" data-loading="Creating account...">
                Sign Up
            </button>
        </form>

        <div class="auth-footer">
            <p>Already have an account? <a href="#/login">Sign in</a></p>
            <p class="terms">
                By signing up, you agree to our
                <a href="#/terms">Terms</a> and
                <a href="#/privacy">Privacy Policy</a>.
            </p>
        </div>
    </div>
</div>

<script type="module">
    import { form, notify, auth, context } from '../../../../build/oja.core.esm.js';
    import { mockData } from '../data/mock.js';

    const [, setCurrentUser] = context('user');
    const formEl = find('#register-form');

    // Handle registration with password confirmation validation
    form.on(formEl, {
        submit: async (data) => {
            if (data.password !== data.confirmPassword) {
                form.showError(formEl, 'confirmPassword', 'Passwords do not match');
                throw new Error('validation');
            }

            const existing = mockData.users.find(u => u.username === data.username);
            if (existing) {
                form.showError(formEl, 'username', 'Username already taken');
                throw new Error('validation');
            }

            const newUser = {
                id       : Date.now().toString(),
                name     : data.name,
                username : data.username,
                avatar   : data.name[0]?.toUpperCase() ?? '?',
                bio      : '',
                followers: 0,
                following: 0,
                joined   : new Date().toISOString().slice(0, 10),
                verified : false,
            };

            await auth.session.start('mock-jwt-token');
            setCurrentUser(newUser);
            return newUser;
        },
        success: () => {
            notify.success('Account created! Welcome to Twitter!');
            window.location.hash = '/';
        },
        error: (err) => {
            if (err.message !== 'validation') notify.error(err.message);
        },
    });
</script>
