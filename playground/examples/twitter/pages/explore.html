<div class="page explore-page">
    <div class="page-header">
        <h1>Explore</h1>
    </div>
    <!-- Search bar -->
    <div class="explore-search">
        <span class="search-icon">🔍</span>
        <input type="search"
               placeholder="Search Twitter"
               id="explore-search"
               autocomplete="off">
    </div>
    <!-- Trending feed -->
    <div class="trending-feed">
        <div class="trending-header">
            <h2>Trends for you</h2>
        </div>
        <div id="trends-list">
            <template data-each="trends" data-as="trend">
                <div class="trend-item" data-trend="{{trend.name}}">
                    <div class="trend-category">{{trend.category}} · Trending</div>
                    <div class="trend-name">#{{trend.name}}</div>
                    <div class="trend-count">{{trend.tweets}} tweets</div>
                </div>
            </template>
        </div>
    </div>
</div>
<script type="module">
    import { effect, on, state, each } from '../../../../build/oja.core.esm.js';

    // Reactive search query state
    const [searchQuery, setSearchQuery] = state('');
    const searchInput = document.getElementById('explore-search');

    if (searchInput) {
        on(searchInput, 'input', (e) => setSearchQuery(e.target.value));
    }

    // Render trends and filter by search query reactively
    effect(() => {
        const trendsList = document.getElementById('trends-list');
        if (!trendsList) return;

        each(trendsList, 'trends', props.trends);

        const query = searchQuery().toLowerCase().trim();
        if (!query) return;

        trendsList.querySelectorAll('.trend-item').forEach(item => {
            const trendName = (item.dataset.trend || '').toLowerCase();
            item.style.display = trendName.includes(query) ? '' : 'none';
        });
    });
</script>
