<div class="page profile-page">
    <div class="profile-header">
        <div class="profile-cover"></div>
        <div class="profile-avatar large">{{currentUser.avatar}}</div>
    </div>
    <div class="profile-info">
        <div class="profile-name-row">
            <div>
                <h2>{{currentUser.name}}</h2>
                <span class="username">@{{currentUser.username}}</span>
            </div>
        </div>
        <p class="profile-bio">{{currentUser.bio}}</p>
        <div class="profile-stats">
            <span><strong>{{currentUser.following}}</strong> Following</span>
            <span><strong>{{currentUser.followers}}</strong> Followers</span>
        </div>
    </div>
    <!-- User's tweets -->
    <div class="profile-tabs">
        <button class="tab active">Tweets</button>
    </div>
    <div class="feed" id="user-tweets"></div>
</div>
<script type="module">
    import { component, context } from '../../../../build/oja.core.esm.js';

    // Pull the current user's tweets from shared context and mount each one
    const [tweets] = context('tweets');
    const feed     = find('#user-tweets');

    if (feed) {
        const userTweets = tweets().filter(t => t.userId === props.currentUser?.id);

        if (userTweets.length === 0) {
            feed.innerHTML = '<div class="empty-feed">No tweets yet</div>';
        } else {
            userTweets.forEach(tweet => {
                const wrapper = document.createElement('div');
                feed.appendChild(wrapper);
                component.mount(wrapper, 'components/tweet.html', {
                    ...tweet,
                    currentUser: props.currentUser,
                });
            });
        }
    }
</script>
