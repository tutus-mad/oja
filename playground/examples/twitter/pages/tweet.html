<div class="page tweet-page">
    <div class="page-header">
        <a href="#/" class="back-button">←</a>
        <h1>Tweet</h1>
    </div>
    <!-- Single tweet view -->
    <div id="tweet-container" class="tweet-detail"></div>
    <!-- Reply form -->
    <div class="reply-form" data-if="currentUser">
        <div class="avatar">{{currentUser.avatar}}</div>
        <div class="reply-content">
            <textarea placeholder="Tweet your reply"
                      id="reply-input"
                      maxlength="280"></textarea>
            <div class="reply-footer">
                <span id="reply-count">0/280</span>
                <button class="reply-button"
                        data-action="post-reply"
                        data-loading="Replying...">
                    Reply
                </button>
            </div>
        </div>
    </div>
    <!-- Replies -->
    <div class="replies-section" id="replies-section">
        <h3>Replies</h3>
        <div id="replies-feed"></div>
    </div>
</div>
<script type="module">
    import { component, effect, state, on, notify, context } from '../../../../build/oja.core.esm.js';

    const MAX_REPLY_LENGTH = 280;
    const COLOR_WARNING    = '#f4212e';
    const COLOR_NORMAL     = '#71767b';
    const CHAR_WARN_AT     = 260;

    // Shared tweets context for state updates
    const [tweets, setTweets] = context('tweets');
    const [replyContent, setReplyContent] = state('');

    const tweetId     = props.params?.id;
    const tweetEl     = find('#tweet-container');
    const repliesFeed = find('#replies-feed');
    const replyInput  = find('#reply-input');
    const replyCount  = find('#reply-count');

    // Mount the matching tweet or show a not-found message
    effect(() => {
        if (!tweetEl) return;
        const currentTweet = tweets().find(t => t.id === tweetId);
        if (!currentTweet) {
            tweetEl.innerHTML = '<div class="tweet-not-found">Tweet not found</div>';
            return;
        }
        tweetEl.innerHTML = '';
        component.mount(tweetEl, 'components/tweet.html', {
            ...currentTweet,
            currentUser: props.currentUser,
        });
    });

    // Render mock replies for demonstration
    effect(() => {
        const currentTweet = tweets().find(t => t.id === tweetId);
        if (!repliesFeed || !currentTweet) return;

        const mockReplies = [
            {
                id           : 'r1',
                userName     : 'Sarah Chen',
                userUsername : 'sarahcodes',
                userAvatar   : 'S',
                content      : 'This is awesome! 🔥',
                timestamp    : Date.now() - 1800000,
            },
            {
                id           : 'r2',
                userName     : 'Marcus Williams',
                userUsername : 'marcusw',
                userAvatar   : 'M',
                content      : 'Great point!',
                timestamp    : Date.now() - 3600000,
            },
        ];

        repliesFeed.innerHTML = mockReplies.map(reply => `
            <div class="reply-card">
                <div class="avatar">${reply.userAvatar}</div>
                <div class="reply-content">
                    <div class="reply-header">
                        <span class="reply-name">${reply.userName}</span>
                        <span class="reply-username">@${reply.userUsername}</span>
                        <span class="reply-time">${new Date(reply.timestamp).toLocaleTimeString()}</span>
                    </div>
                    <div class="reply-body">${reply.content}</div>
                </div>
            </div>
        `).join('');
    });

    // Update reply character count with color warning near limit
    effect(() => {
        if (!replyCount) return;
        const len = replyContent().length;
        replyCount.textContent = `${len}/${MAX_REPLY_LENGTH}`;
        replyCount.style.color = len > CHAR_WARN_AT ? COLOR_WARNING : COLOR_NORMAL;
    });

    if (replyInput) {
        on(replyInput, 'input', (e) => setReplyContent(e.target.value));
    }

    // Increment reply count on the tweet and clear the input
    on('[data-action="post-reply"]', 'click', () => {
        const currentTweet = tweets().find(t => t.id === tweetId);
        if (!replyContent().trim() || !currentTweet) return;

        setTweets(tweets().map(t =>
            t.id === tweetId ? { ...t, replies: t.replies + 1 } : t
        ));
        notify.success('Reply posted!');

        if (replyInput) {
            replyInput.value = '';
            setReplyContent('');
        }
    });
</script>
