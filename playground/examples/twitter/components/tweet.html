<div class="tweet" data-tweet-id="{{id}}">
    <div class="tweet-avatar">
        <div class="avatar">{{userAvatar}}</div>
    </div>
    <div class="tweet-content">
        <div class="tweet-header">
            <span class="tweet-name">{{userName}}</span>
            <span class="tweet-username">@{{userUsername}}</span>
            <span class="tweet-time">{{timestamp | ago}}</span>
        </div>
        <div class="tweet-body">
            <a href="#/tweet/{{id}}" class="tweet-link">
                {{content}}
            </a>
        </div>
        <div class="tweet-actions">
            <button class="tweet-action" data-action="reply">
                💬 {{replies}}
            </button>
            <button class="tweet-action {{if retweeted}}active{{end}}"
                    data-action="retweet">
                🔁 {{retweets}}
            </button>
            <button class="tweet-action {{if liked}}active{{end}}"
                    data-action="like">
                ❤️ {{likes}}
            </button>
        </div>
    </div>
</div>
<script type="module">
    import { on, context } from '../../../../build/oja.core.esm.js';

    // Shared tweets context for reactive state updates across components
    const [tweets, setTweets] = context('tweets');

    // Toggle like with optimistic counter update
    on('[data-action="like"]', 'click', (e, el) => {
        const tweetEl = el.closest('[data-tweet-id]');
        const tweetId = tweetEl?.dataset.tweetId;
        if (!tweetId) return;

        setTweets(tweets().map(t => {
            if (t.id !== tweetId) return t;
            return { ...t, liked: !t.liked, likes: t.liked ? t.likes - 1 : t.likes + 1 };
        }));
    });

    // Toggle retweet with optimistic counter update
    on('[data-action="retweet"]', 'click', (e, el) => {
        const tweetEl = el.closest('[data-tweet-id]');
        const tweetId = tweetEl?.dataset.tweetId;
        if (!tweetId) return;

        setTweets(tweets().map(t => {
            if (t.id !== tweetId) return t;
            return { ...t, retweeted: !t.retweeted, retweets: t.retweeted ? t.retweets - 1 : t.retweets + 1 };
        }));
    });

    // Navigate to tweet detail page
    on('[data-action="reply"]', 'click', (e, el) => {
        const tweetEl = el.closest('[data-tweet-id]');
        const tweetId = tweetEl?.dataset.tweetId;
        if (!tweetId) return;
        window.location.hash = `#/tweet/${tweetId}`;
    });
</script>
