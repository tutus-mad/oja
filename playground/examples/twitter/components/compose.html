<div class="compose-modal-content">
    <textarea placeholder="What's happening?"
              id="modal-compose"
              class="compose-textarea"
              maxlength="280"
              autofocus></textarea>
    <div class="compose-footer">
        <span id="modal-count">0/280</span>
        <button class="compose-submit"
                data-action="submit-tweet"
                data-loading="Posting...">
            Tweet
        </button>
    </div>
</div>
<script type="module">
    import { effect, state, on, modal, notify, context } from '../../../../build/oja.core.esm.js';

    const MAX_TWEET_LENGTH = 280;
    const COLOR_WARNING    = '#f4212e';
    const COLOR_NORMAL     = '#71767b';
    const CHAR_WARN_AT     = 260;

    // Shared tweets context setter for state updates
    const [tweets, setTweets] = context('tweets');
    const [content, setContent] = state('');

    const input   = find('#modal-compose');
    const countEl = find('#modal-count');

    // Update character count display with color warning near limit
    effect(() => {
        if (!countEl) return;
        const len = content().length;
        countEl.textContent = `${len}/${MAX_TWEET_LENGTH}`;
        countEl.style.color = len > CHAR_WARN_AT ? COLOR_WARNING : COLOR_NORMAL;
    });

    on(input, 'input', (e) => setContent(e.target.value));

    // Validate, build, and prepend the new tweet then close the modal
    on('[data-action="submit-tweet"]', 'click', () => {
        if (!content().trim()) return;
        const currentUserVal = props.currentUser;
        if (!currentUserVal) {
            notify.error('Not logged in');
            return;
        }

        const newTweet = {
            id           : Date.now().toString(),
            userId       : currentUserVal.id,
            userName     : currentUserVal.name,
            userUsername : currentUserVal.username,
            userAvatar   : currentUserVal.avatar,
            content      : content().trim(),
            likes        : 0,
            retweets     : 0,
            replies      : 0,
            timestamp    : Date.now(),
            liked        : false,
            retweeted    : false,
        };

        setTweets([newTweet, ...tweets()]);
        modal.close();
        notify.success('Tweet posted!');
    });

    if (input) input.focus();
</script>
