<div class="who-to-follow">
    <h3>Who to follow</h3>
    <div id="suggestions">
        <template data-each="suggestions" data-as="user">
            <div class="suggestion-item" data-user-id="{{user.id}}">
                <div class="suggestion-avatar">
                    {{user.avatar}}
                </div>
                <div class="suggestion-info">
                    <div class="suggestion-name">{{user.name}}</div>
                    <div class="suggestion-username">@{{user.username}}</div>
                </div>
                <button class="follow-button"
                        data-action="follow"
                        data-user-id="{{user.id}}"
                        data-loading="...">
                    Follow
                </button>
            </div>
        </template>
    </div>
</div>
<script type="module">
    import { each, on, notify } from '../../../../build/oja.core.esm.js';

    // Render suggestions list using Oja each() for reactive updates
    const suggestions = find('#suggestions');
    if (suggestions) {
        each(suggestions, 'suggestions', props.suggestions);
    }

    // Toggle follow state with visual feedback and notification
    on('[data-action="follow"]', 'click', (e, btn) => {
        const isFollowing = btn.classList.toggle('following');
        btn.textContent = isFollowing ? 'Following' : 'Follow';
        notify.success(isFollowing ? 'Followed!' : 'Unfollowed');
    });
</script>
