<div class="trend-item" data-trend="{{name}}">
    <div class="trend-header">
        <div class="trend-meta">
            <span class="trend-category">{{category}}</span>
            <span class="trend-badge">· Trending</span>
        </div>
        <button class="trend-menu" aria-label="More options">⋯</button>
    </div>
    <div class="trend-content">
        <a href="#/explore?q={{name}}" class="trend-name">
            #{{name}}
        </a>
        <div class="trend-stats">
            <span class="trend-tweets">{{tweets}} tweets</span>
        </div>
    </div>
</div>
<script type="module">
    import { on, notify } from '../../../../build/oja.core.esm.js';

    // Handle trend menu click with demo options dialog
    on('.trend-menu', 'click', (e, btn) => {
        e.preventDefault();
        e.stopPropagation();
        const trend     = btn.closest('.trend-item');
        const trendName = trend?.dataset.trend;
        const options   = ['Not interested', 'This trend is harmful', 'Show more often'];
        const choice    = prompt(`Options for #${trendName}:\n${options.map((o, i) => `${i + 1}. ${o}`).join('\n')}`);
        if (choice !== null) {
            notify.info(`Selected: ${options[parseInt(choice) - 1] || 'Custom'}`);
        }
    });

    on('.trend-name', 'click', (e) => {
        e.stopPropagation();
    });
</script>
