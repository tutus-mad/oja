<div class="card">
    <p class="card-title">Todo Parent</p>

    <div style="display:flex;gap:8px;margin-bottom:24px">
        <input type="text" id="new-task" placeholder="Enter a new task..."
               style="flex:1;padding:10px;border-radius:8px;border:1px solid #2a2a2a;background:#1a1a1a;color:#e8e8e8;">
        <button class="btn btn-primary" id="add-btn">Add</button>
    </div>

    <!-- The child component will be mounted here -->
    <div id="child-container"></div>
</div>

<script type="module">
    import { state, on, Out } from '../../../../build/oja.core.esm.js';

    // 1. Create a reactive signal
    const [tasks, setTasks] = state([
        { id: 1, text: 'Validate static props in template' },
        { id: 2, text: 'Validate reactive props in script' }
    ]);

    // 2. Mount the child component, passing the reactive signal directly
    Out.component('components/todo-child.html', {
        title: "Child Component View", // Static value
        tasks: tasks                   // Reactive signal (passed as reference)
    }).render(find('#child-container'));

    // 3. Update the parent state
    on('#add-btn', 'click', () => {
        const input = find('#new-task');
        if (input.value.trim()) {
            setTasks([...tasks(), { id: Date.now(), text: input.value.trim() }]);
            input.value = '';
        }
    });


</script>
