<!--
  pages/counter.html
  Page 1 — Counter

  Demonstrates:
    context() — count lives here so it survives navigating away and back
    effect()  — all DOM updates live here, driven by state changes
    on()      — event handling via Oja, not addEventListener
    find()    — scoped DOM queries via Oja, not getElementById
    notify    — milestone toast
-->
<div class="card">
    <p class="card-title">Counter</p>

    <div class="count-display" id="count">0</div>

    <div class="progress-track">
        <div class="progress-fill" id="progress-bar" style="width:0%"></div>
    </div>

    <div class="btn-row">
        <button class="btn" id="btn-reset">Reset</button>
        <button class="btn btn-primary" id="btn-increment">+ Increment</button>
    </div>

    <p class="card-hint" id="message">Click increment to begin</p>
</div>

<script type="module">
    import { context, effect, on, notify } from '../../../../build/oja.core.esm.js';

    const MAX = 10;

    // context() keeps count alive across navigation — state() would reset on remount
    const [count, setCount] = context('count', 0);

    // ── find() — injected by _exec.js, automatically scoped to this component ─
    const countEl  = find('#count');
    const barEl    = find('#progress-bar');
    const msgEl    = find('#message');
    const incrBtn  = find('#btn-increment');
    const resetBtn = find('#btn-reset');

    // ── Effects — every DOM change flows from here, never written ad-hoc ──────
    effect(() => {
        const n = count();

        countEl.textContent  = n;
        barEl.style.width    = `${(n / MAX) * 100}%`;
        incrBtn.disabled     = n >= MAX;

        if (n === 0)      msgEl.textContent = 'Click increment to begin';
        else if (n < MAX) msgEl.textContent = `${MAX - n} to go…`;
        else              msgEl.textContent = '🎉 You made it!';

        // Replay CSS bump animation on every count change
        countEl.classList.remove('bump');
        requestAnimationFrame(() => countEl.classList.add('bump'));
    });

    // Milestone toast — separate effect so the concern is isolated
    effect(() => {
        if (count() === MAX) notify.success('Hurray! You reached 10! 🎉', { duration: 4000 });
    });

    // ── Events — on() targets the element directly, scoped to this component ──
    on(incrBtn,  'click', () => { if (count() < MAX) setCount(count() + 1); });
    on(resetBtn, 'click', () => setCount(0));
</script>
