<div style="padding:16px; border:1px solid #2a2a2a; border-radius:12px; background:#0f0f0f; text-align:left;">

    <!-- Testing Template Auto-Unwrap: 'title' is static, 'tasks' is a signal -->
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; border-bottom:1px solid #1e1e1e; padding-bottom:12px;">
        <h3 style="font-size:14px; margin:0; color:#e8e8e8;">{{title}}</h3>
        <span style="font-size:12px; color:#888;">Total: {{tasks.length}}</span>
    </div>

    <ul id="task-list" style="list-style:none; padding:0; margin:0; display:flex; flex-direction:column; gap:8px;">
        <!-- Rendered via JS to test the Proxy -->
    </ul>

</div>

<script type="module">
    import { effect } from '../../../../build/oja.core.esm.js';

    const listEl = find('#task-list');

    // Testing Script Proxy: Accessing props.tasks triggers the signal unwrap
    // and automatically binds this effect to the parent's state.
    effect(() => {
        const currentTasks = props.tasks;

        if (currentTasks.length === 0) {
            listEl.innerHTML = '<li style="color:#555; font-size:13px; text-align:center;">No tasks found.</li>';
            return;
        }

        listEl.innerHTML = currentTasks.map(t =>
            `<li style="padding:10px 12px; background:#1a1a1a; border-radius:6px; font-size:13px; display:flex; align-items:center;">
                <span style="color:#4a9a4a; margin-right:10px;">✓</span> ${t.text}
            </li>`
        ).join('');
    });
</script>
