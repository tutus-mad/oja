name: Build

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: make all

      - name: Verify build output
        run: |
          echo "── build/ contents ──"
          ls -lh build/
          test -f build/oja.core.esm.js || (echo "ERROR: oja.core.esm.js missing" && exit 1)
          test -f build/oja.core.min.js || (echo "ERROR: oja.core.min.js missing" && exit 1)
          test -f build/oja.min.css     || (echo "ERROR: oja.min.css missing"     && exit 1)

      - name: Sync version from tag
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          npm version $VERSION --no-git-tag-version

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/oja.core.esm.js
            build/oja.core.min.js
            build/oja.full.esm.js
            build/oja.full.min.js
            build/oja.min.css
          generate_release_notes: true