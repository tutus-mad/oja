<!--
  pages/game.html
  Rhyme Rush

  Demonstrates Oja handling real async complexity:
    context()  — level index survives navigating away and back
    state()    — phase, score, spokenWords, useAI — all reactive signals
    effect()   — every DOM update is driven by state, zero ad-hoc writes
    Channel    — audio → processing pipeline, decoupled from UI
    go()       — goroutine-style async workers consuming the pipeline
    on()       — hold-to-speak, toggle switch, next button
    animate()  — staggered card bounce on result
    notify     — level clear toasts
-->

<div class="game-shell">
    <h2>Rhyme Rush</h2>
    <p class="game-subtitle">Say all the words in order</p>

    <!-- AI toggle -->
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
        <div class="level-dots" id="level-dots"></div>
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:12px;color:#555;user-select:none">
            <div class="toggle-track" id="ai-toggle">
                <div class="toggle-thumb"></div>
            </div>
            <span id="ai-label">Browser STT</span>
        </label>
    </div>

    <div class="word-grid" id="word-grid"></div>

    <!-- Pipeline status + transcript -->
    <div class="pipeline-log" id="pipeline-log" style="display:none">
        <div id="pipeline-status"></div>
        <div id="pipeline-transcript" style="color:#888;margin-top:3px"></div>
    </div>

    <div id="result-panel"></div>

    <div class="game-controls">
        <button class="btn-speak" id="btn-speak">🎤 Hold to Speak</button>
        <button class="btn btn-primary" id="btn-next" style="display:none;width:100%">
            Next Level →
        </button>
        <p class="game-hint" id="game-hint">Press and hold, then say all the words in order</p>
    </div>
</div>

<style>
    .toggle-track {
        width: 36px;
        height: 20px;
        border-radius: 10px;
        background: #2a2a2a;
        border: 1px solid #3a3a3a;
        position: relative;
        transition: background 0.2s;
        flex-shrink: 0;
    }
    .toggle-track.on { background: #3a5a3a; border-color: #4a9a4a; }
    .toggle-thumb {
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: #666;
        position: absolute;
        top: 2px;
        left: 2px;
        transition: left 0.2s, background 0.2s;
    }
    .toggle-track.on .toggle-thumb { left: 18px; background: #4a9a4a; }
</style>

<script type="module">
    import {
        state, effect, context,
        Channel, go,
        on, animate, notify,
    } from '../../../build/oja.core.esm.js';

    // ── Data ──────────────────────────────────────────────────────────────────

    const LEVELS = [
        [
            { w: 'hen', i: '🐔' },
            { w: 'ten', i: '🔟' },
            { w: 'pen', i: '🖊️' },
            { w: 'men', i: '👥' },
        ],
        [
            { w: 'cat', i: '🐱' },
            { w: 'bat', i: '🦇' },
            { w: 'rat', i: '🐀' },
            { w: 'hat', i: '🧢' },
        ],
        [
            { w: 'run', i: '🏃' },
            { w: 'sun', i: '☀️' },
            { w: 'fun', i: '😂' },
            { w: 'gun', i: '🔫' },
        ],
        [
            { w: 'fish', i: '🐟' },
            { w: 'dish', i: '🍽️' },
            { w: 'wish', i: '🧞' },
        ],
    ];

    const ACCENT_MAP = {
        hen:  ['hen', 'hens', 'en', 'end', 'in'],
        ten:  ['ten', 'den', 'then', 'tan', 'tin', '10'],
        pen:  ['pen', 'pan', 'pin', 'pain', 'bin'],
        men:  ['men', 'man', 'main', 'mehn', 'min'],
        cat:  ['cat', 'cut', 'cart'],
        bat:  ['bat', 'bad', 'but', 'bed'],
        rat:  ['rat', 'rap', 'wrap', 'rot'],
        hat:  ['hat', 'hot', 'heart', 'hut'],
        run:  ['run', 'ran', 'ron', 'wrong'],
        sun:  ['sun', 'son', 'soon', 'song'],
        fun:  ['fun', 'phone', 'fan', 'fond'],
        gun:  ['gun', 'gone', 'gan'],
        fish: ['fish', 'fitch', 'feast', 'face'],
        dish: ['dish', 'ditch', 'this', 'these'],
        wish: ['wish', 'witch', 'which', 'way'],
    };

    // ── Reactive state ────────────────────────────────────────────────────────

    const [levelIdx, setLevelIdx] = context('gameLevel', 0);
    const [phase,    setPhase]    = state('idle');
    const[spoken,   setSpoken]   = state([]);
    const [score,    setScore]    = state(0);
    const [useAI,    setUseAI]    = state(false);
    const[whisperReady, setWhisperReady] = state(false);

    // ── Whisper loader ────────────────────────────────────────────────────────

    let whisperPipeline = null;

    async function loadWhisper() {
        setPhase('loading');
        updateStatus('⏳ Loading Whisper (25MB)…');
        try {
            const { pipeline, env } = await import('https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2');
            env.allowLocalModels = false;
            env.useBrowserCache  = true;

            whisperPipeline = await pipeline('automatic-speech-recognition', 'Xenova/whisper-tiny.en', {
                progress_callback: (d) => {
                    if (d.status === 'progress') {
                        const pct = Math.round(d.progress * 100);
                        updateStatus(`⏳ Whisper ${pct}%…`);
                    }
                },
            });

            await whisperPipeline(new Float32Array(16000));
            setWhisperReady(true);
            setPhase('idle');
            updateStatus('');
        } catch (e) {
            console.error('[game] Whisper load failed:', e);
            setUseAI(false);
            setPhase('idle');
            updateStatus('⚠ Whisper failed — switched to browser STT');
        }
    }

    // ── Channel pipeline ──────────────────────────────────────────────────────

    const audioChannel  = new Channel(1);
    const resultChannel = new Channel(1);

    go(async () => {
        for await (const payload of audioChannel) {
            let transcript = '';
            try {
                if (typeof payload === 'string') {
                    transcript = payload;
                } else {
                    const { blob, audioCtx } = payload;
                    const buf     = await blob.arrayBuffer();
                    const decoded = await audioCtx.decodeAudioData(buf);
                    let   pcm     = decoded.getChannelData(0);

                    if (decoded.sampleRate !== 16000) {
                        pcm = resample(pcm, decoded.sampleRate, 16000);
                    }

                    const out  = await whisperPipeline(pcm);
                    transcript = out.text;
                }

                updateTranscript(`"${transcript.trim()}"`);

                const words   = transcript.toLowerCase().replace(/[^a-z0-9\s]/g, '').trim().split(/\s+/).filter(Boolean);
                const level   = LEVELS[levelIdx()];
                const targets = level.map(l => l.w);

                const results = level.map((item, i) => ({
                    target: item.w,
                    spoken: words[i] || '',
                    ok:     isMatch(item.w, words[i] || '', targets),
                }));

                await resultChannel.send(results);

            } catch (e) {
                console.error('[game] pipeline stage 1 error:', e);
                await resultChannel.send(LEVELS[levelIdx()].map(item => ({
                    target: item.w, spoken: '', ok: false,
                })));
            }
        }
    });

    go(async () => {
        for await (const results of resultChannel) {
            setSpoken(results.map(r => r.spoken));
            setScore(results.filter(r => r.ok).length);
            setPhase('done');
        }
    });

    // ── DOM refs ──────────────────────────────────────────────────────────────

    const wordGridEl  = find('#word-grid');
    const levelDotsEl = find('#level-dots');
    const resultPanel = find('#result-panel');
    const btnSpeak    = find('#btn-speak');
    const btnNext     = find('#btn-next');
    const hintEl      = find('#game-hint');
    const logEl       = find('#pipeline-log');
    const statusEl    = find('#pipeline-status');
    const transcriptEl = find('#pipeline-transcript');
    const aiToggle    = find('#ai-toggle');
    const aiLabel     = find('#ai-label');

    function updateStatus(msg)     { statusEl.textContent    = msg; logEl.style.display = msg ? '' : 'none'; }
    function updateTranscript(msg) { transcriptEl.textContent = msg; }

    // ── Effects ───────────────────────────────────────────────────────────────

    effect(() => {
        const idx   = levelIdx();
        const level = LEVELS[idx];

        wordGridEl.innerHTML = '';
        level.forEach((item, i) => {
            const card       = document.createElement('div');
            card.className   = 'word-card';
            card.id          = `wc-${i}`;
            card.innerHTML   = `
                <div class="word-icon">${item.i}</div>
                <div>
                    <div class="word-label">${item.w}</div>
                    <div class="word-heard" id="wh-${i}"></div>
                </div>
            `;
            wordGridEl.appendChild(card);
        });

        levelDotsEl.innerHTML = '';
        LEVELS.forEach((_, i) => {
            const dot       = document.createElement('div');
            dot.className   = `level-dot ${i === idx ? 'active' : ''} ${i < idx ? 'completed' : ''}`;
            levelDotsEl.appendChild(dot);
        });

        setPhase('idle');
        setSpoken([]);
        setScore(0);
        resultPanel.innerHTML = '';
        updateStatus('');
        updateTranscript('');
    });

    effect(() => {
        const on = useAI();
        aiToggle.className = `toggle-track ${on ? 'on' : ''}`;
        aiLabel.textContent = on ? 'Whisper AI' : 'Browser STT';
    });

    effect(() => {
        const p = phase();

        if (p === 'loading') {
            btnSpeak.disabled    = true;
            btnSpeak.className   = 'btn-speak thinking';
            btnSpeak.textContent = '⏳ Loading Whisper…';
            hintEl.textContent   = 'Downloading AI model (~25MB), please wait';
            return;
        }

        btnSpeak.disabled = (p === 'thinking');

        if (p === 'idle') {
            btnSpeak.className    = 'btn-speak';
            btnSpeak.textContent  = '🎤 Click to Speak';
            hintEl.textContent    = 'Click, say all the words, then click again to stop';
            btnNext.style.display = 'none';
        }

        if (p === 'listening') {
            btnSpeak.style.transform = 'scale(0.96)';
            btnSpeak.className   = 'btn-speak active';
            btnSpeak.textContent = '🔴 Listening… click to stop';
            hintEl.textContent   = 'Say all the words now';
        }

        if (p === 'thinking') {
            btnSpeak.className   = 'btn-speak thinking';
            btnSpeak.textContent = '🧠 Thinking…';
            hintEl.textContent   = 'Processing your answer';
            updateStatus('▶ audio → channel → processing…');
            updateTranscript('');
        }
    });

    effect(() => {
        const words  = spoken();
        const p      = phase();
        if (!words.length || p !== 'done') return;

        const level  = LEVELS[levelIdx()];
        const passed = score() === level.length;

        level.forEach((item, i) => {
            const card    = document.getElementById(`wc-${i}`);
            const heardEl = document.getElementById(`wh-${i}`);
            const s       = words[i] || '—';
            const ok      = isMatch(item.w, s, level.map(l => l.w));

            heardEl.textContent = s;
            heardEl.className   = `word-heard ${ok ? 'match' : 'miss'}`;
            card.classList.remove('correct', 'wrong', 'pending');
            card.classList.add(ok ? 'correct' : 'wrong');

            animate.to(card, { scale: [1.05, 1] }, { duration: 220, delay: i * 70 });
        });

        resultPanel.innerHTML = passed
            ? `<div class="score-result pass">
                   <div class="score-label" style="color:#4a9a4a">✓ ${score()}/${level.length} — Level Clear!</div>
               </div>`
            : `<div class="score-result fail">
                   <div class="score-label" style="color:#9a4a4a">✗ ${score()}/${level.length} — Try again</div>
                   <div class="score-sub">Speak clearly and close to the mic</div>
               </div>`;

        updateStatus(`▶ pipeline complete — ${score()}/${level.length} matched`);

        if (passed) {
            btnNext.style.display = levelIdx() < LEVELS.length - 1 ? 'block' : 'none';
            if (levelIdx() >= LEVELS.length - 1) {
                notify.success('Champion! You cleared all levels! 🏆', { duration: 5000 });
            } else {
                notify.success(`Level ${levelIdx() + 1} cleared! 🎉`);
            }
        }

        btnSpeak.className   = 'btn-speak';
        btnSpeak.textContent = '🔄 Try Again';
    });

    // ── Events ────────────────────────────────────────────────────────────────

    on(aiToggle, 'click', async () => {
        const turningOn = !useAI();
        setUseAI(turningOn);
        if (turningOn && !whisperReady()) await loadWhisper();
    });

    // Replaced mouse Hold events with a simple Click toggle to prevent micro-clicks causing infinite fail loops
    on(btnSpeak, 'click', (e) => {
        if (e) e.preventDefault();
        const p = phase();
        if (p === 'idle' || p === 'done') {
            startListening(e);
        } else if (p === 'listening') {
            stopListening(e);
        }
    });

    on(btnNext, 'click', () => {
        if (levelIdx() < LEVELS.length - 1) setLevelIdx(levelIdx() + 1);
    });

    // ── Recording ─────────────────────────────────────────────────────────────

    let mediaRecorder  = null;
    let audioChunks    =[];
    let audioCtx       = null;
    let recognition    = null;
    let thinkingTimer  = null;
    let _micStream     = null;

    function startListening(e) {
        if (e) e.preventDefault();
        if (phase() === 'thinking' || phase() === 'listening' || phase() === 'loading') return;

        setPhase('listening');
        setSpoken([]);
        setScore(0);
        resultPanel.innerHTML = '';
        updateTranscript('');

        LEVELS[levelIdx()].forEach((_, i) => {
            const card  = document.getElementById(`wc-${i}`);
            const heard = document.getElementById(`wh-${i}`);
            if (card)  card.className = 'word-card';
            if (heard) { heard.textContent = ''; heard.className = 'word-heard'; }
        });

        if (useAI() && whisperReady()) {
            startWhisperRecording();
        } else {
            startBrowserSTT();
        }
    }

    function stopListening(e) {
        if (e) e.preventDefault();
        if (phase() !== 'listening') return;

        if (mediaRecorder?.state === 'recording') {
            mediaRecorder.stop();
        }

        if (_micStream) {
            _micStream.getTracks().forEach(t => t.stop());
        }

        if (recognition) {
            recognition.stop();
            recognition = null;
        }

        setPhase('thinking');
        armThinkingTimeout();
    }

    function armThinkingTimeout() {
        clearTimeout(thinkingTimer);
        thinkingTimer = setTimeout(() => {
            if (phase() === 'thinking') {
                setPhase('idle');
                updateStatus('⚠ No speech detected — try again');
            }
        }, 10000);
    }

    effect(() => {
        if (phase() === 'done') clearTimeout(thinkingTimer);
    });

    async function startWhisperRecording() {
        try {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
            }
            if (audioCtx.state === 'suspended') await audioCtx.resume();

            _micStream = await navigator.mediaDevices.getUserMedia({ audio: true });

            // Abort if user clicked stop while we were waiting for microphone permissions
            if (phase() !== 'listening') {
                _micStream.getTracks().forEach(t => t.stop());
                return;
            }

            mediaRecorder = new MediaRecorder(_micStream);
            audioChunks   =[];

            mediaRecorder.ondataavailable = (e) => {
                if (e.data.size > 0) audioChunks.push(e.data);
            };

            mediaRecorder.onstop = async () => {
                const blob = new Blob(audioChunks, { type: 'audio/webm' });
                await audioChannel.send({ blob, audioCtx });
            };

            mediaRecorder.start();
        } catch (e) {
            console.error('[game] mic error:', e);
            setPhase('idle');
            updateStatus('⚠ Microphone access denied');
        }
    }

    function startBrowserSTT() {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

        if (!SpeechRecognition) {
            updateStatus('▶ No STT available — using demo transcript');
            const level = LEVELS[levelIdx()];
            setTimeout(async () => {
                await audioChannel.send(level.map(l => l.w).join(' '));
            }, 800);
            return;
        }

        recognition          = new SpeechRecognition();
        recognition.lang     = 'en-US';
        recognition.continuous     = false;
        recognition.interimResults = false;

        recognition.onresult = async (e) => {
            const transcript = e.results[0][0].transcript;
            await audioChannel.send(transcript);
        };

        recognition.onerror = (e) => {
            console.warn('[game] speech error:', e.error);
            audioChannel.send('');
        };

        recognition.onend = () => {
            if (phase() === 'listening') setPhase('thinking');
        };

        try {
            recognition.start();
        } catch (e) {
            console.warn(e);
            audioChannel.send('');
        }
    }

    // ── Helpers ───────────────────────────────────────────────────────────────

    function isMatch(target, s, allTargets) {
        if (!s) return false;
        if (s === target) return true;
        if (s === target + 's' || s + 's' === target) return true;
        if (allTargets.includes(s) && s !== target) return false;
        if (ACCENT_MAP[target]?.includes(s)) return true;
        if (target.length > 2 && s.length > 2 && target[0] === s[0] && editDist(target, s) <= 1) return true;
        return false;
    }

    function editDist(a, b) {
        const m = Array.from({ length: b.length + 1 }, (_, i) =>[i]);
        for (let j = 0; j <= a.length; j++) m[0][j] = j;
        for (let i = 1; i <= b.length; i++) {
            for (let j = 1; j <= a.length; j++) {
                m[i][j] = b[i - 1] === a[j - 1]
                    ? m[i - 1][j - 1]
                    : 1 + Math.min(m[i - 1][j - 1], m[i][j - 1], m[i - 1][j]);
            }
        }
        return m[b.length][a.length];
    }

    function resample(data, fromRate, toRate) {
        const ratio  = fromRate / toRate;
        const newLen = Math.round(data.length / ratio);
        const out    = new Float32Array(newLen);
        for (let i = 0; i < newLen; i++) {
            const idx = i * ratio;
            const i1  = Math.floor(idx);
            const i2  = Math.min(i1 + 1, data.length - 1);
            out[i]    = data[i1] * (1 - (idx - i1)) + data[i2] * (idx - i1);
        }
        return out;
    }
</script>
