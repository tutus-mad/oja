<!--
  pages/guestbook.html
  Page 2 — Guestbook

  Demonstrates:
    form.on()       — submit, validation, error display, reset
    form.validate() — declarative field rules
    form.image()    — one-line image preview, no manual FileReader
    context()       — shared entries state, survives navigation to counter and back
    each()          — stamps <template data-each> for every entry
    data-if         — conditional avatar: photo or initial, decided in the template
    find()          — scoped DOM queries, no getElementById
    notify          — success toast
-->
<div class="gb-form">
    <h2>Sign the Guestbook</h2>

    <form id="gb-form">
        <div class="field">
            <label>Your name</label>
            <input name="name" type="text" placeholder="Ada Lovelace" autocomplete="off">
            <span class="field-error" data-field="name"></span>
        </div>
        <div class="field">
            <label>Message</label>
            <textarea name="message" placeholder="Say something nice…"></textarea>
            <span class="field-error" data-field="message"></span>
        </div>
        <div class="field">
            <label>Photo <span style="color:#888;font-size:12px">(optional)</span></label>
            <div style="display:flex;align-items:center;gap:12px">
                <div style="width:48px;height:48px;border-radius:50%;overflow:hidden;
                            background:#333;flex-shrink:0">
                    <img id="avatar-preview" src="" alt="Preview"
                         style="display:none;width:100%;height:100%;object-fit:cover">
                </div>
                <input name="photo" type="file" accept="image/*" id="photo-input"
                       style="font-size:13px;color:#ccc">
            </div>
        </div>
        <button type="submit" class="btn btn-primary"
                style="width:100%;margin-top:4px"
                data-loading="Signing…">
            Sign
        </button>
    </form>
</div>

<div id="entries-list">
    <template data-each="entries" data-as="e">
        <div class="entry">
            <div class="entry-avatar" data-bind="style:e.avatarStyle">
                <img data-if="e.photo" data-bind="src:e.photo"
                     style="width:100%;height:100%;object-fit:cover;border-radius:50%">
                <span data-if-not="e.photo">{{e.initial}}</span>
            </div>
            <div>
                <div class="entry-name">{{e.name}}</div>
                <div class="entry-message">{{e.message}}</div>
                <div class="entry-time">{{e.time}}</div>
            </div>
        </div>
    </template>

    <div data-empty="entries"
         style="text-align:center;color:#444;padding:32px 0;font-size:13px">
        No entries yet — be the first to sign!
    </div>
</div>

<script type="module">
    import { form, each, notify, context, on } from '../../../build/oja.core.esm.js';

    const COLORS = ['#f9a825', '#66bb6a', '#42a5f5', '#ab47bc', '#ef5350', '#26c6da'];

    const [entries, setEntries] = context('entries', []);

    const listEl     = find('#entries-list');
    const formEl     = find('#gb-form');
    const nameInput  = find('[name="name"]');
    const msgInput   = find('[name="message"]');
    const previewImg = find('#avatar-preview');
    const photoInput = find('#photo-input');

    form.image(photoInput, previewImg, {
        onError: (msg) => notify.error(msg),
    });

    function renderEntries() {
        each(listEl, 'entries', entries());
    }

    renderEntries();

    form.on(formEl, {
        submit: async (data) => {
            const ok = await form.validate(formEl, {
                name:    (v) => v.trim().length >= 2 || 'Name must be at least 2 characters',
                message: (v) => v.trim().length >= 5 || 'Message must be at least 5 characters',
            });
            if (!ok) throw new Error('validation');
            return data;
        },

        success: async (data) => {
            const idx   = entries().length;
            const color = COLORS[idx % COLORS.length];

            // Read directly from inputs — bypasses any FormData quirks
            const nameVal    = nameInput.value.trim();
            const messageVal = msgInput.value.trim();

            const photo = previewImg.style.display !== 'none' && previewImg.src
                ? previewImg.src
                : null;

            setEntries([{
                name    : nameVal,
                message : messageVal,
                initial : nameVal[0].toUpperCase(),
                color,
                photo,
                avatarStyle: photo ? 'background:transparent' : `background:${color}`,
                time    : new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
            }, ...entries()]);

            renderEntries();
            form.reset(formEl);
            previewImg.style.display = 'none';
            previewImg.src = '';

            notify.success(`Thanks for signing, ${nameVal}!`);
        },

        error: (err) => {
            if (err.message !== 'validation') notify.error(err.message);
        },
    });
</script>
